# Copy to config.yaml and adjust paths if needed.

# Repository root (parent of src/content/posts)
project_root: ".."

# Ollama HTTP API
ollama:
  base_url: "http://127.0.0.1:11434"
  # Google Gemma — prefer Gemma 4 once Ollama is current: `ollama pull gemma4:e2b` then set chat_model: "gemma4:e2b"
  # (Older Ollama builds return 412 for gemma4; upgrade from https://ollama.com/download )
  # Gemma 3 4B is small (~3.3GB) and works well for drafting: `ollama pull gemma3:4b`
  chat_model: "gemma3:4b"
  # Optional: embedding model for RAG ranking (if absent, keyword scoring is used)
  embed_model: null

# Search & retrieval
search:
  ddg_timeout_seconds: 55
  max_results_per_query: 8
  max_pages_to_fetch: 6
  chunk_chars: 1200
  chunk_overlap: 200
  # Domains get bonus points when scoring source quality
  trusted_domain_hints:
    - "cdc.gov"
    - "epa.gov"
    - "usda.gov"
    - "extension.org"
    - "ksre.k-state.edu"
    - "extension.missouri.edu"

# Generation loop
generation:
  max_attempts: 20
  min_quality_score: 90
  min_words: 450
  # Weekly hub: shorter “trailer” (see prompts); sub-posts use min_words
  hub_min_words: 360
  hub_max_words: 900
  min_external_citation_links: 3
  # Jaccard word-overlap vs prior posts in this week’s series (reject draft if above)
  max_word_overlap_vs_series: 0.22
  # Stricter ceiling for part 1 (overview is in prior bodies)
  max_word_overlap_part1_vs_series: 0.26

# Schedule (America/Chicago): sub-posts run at this clock hour, on the minute tick below
schedule:
  timezone: "America/Chicago"
  publish_hour_central: 8
  publish_minute: 13

# Git / deploy (set enabled: true when the agent should commit/push; netlify needs CLI + site link)
publish:
  enabled: false
  git_commit: true
  git_push: true
  netlify_deploy: false
  netlify_prod: true

# Optional: set a default hero image path for every generated post.
# Leave unset (or null) to publish posts with no cover image until you add real art.
# default_cover_image: "/images/blog/my-topic.jpg"
